name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  lint-commits:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Lint commit messages
        uses: wagoid/commitlint-github-action@v6

  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: |
            frontend/package-lock.json
            typespec/package-lock.json

      - name: Backend — install tools
        run: make -C backend tools

      - name: Backend — lint
        run: make -C backend lint

      - name: Backend — test
        run: make -C backend test

      - name: Frontend — install dependencies
        run: npm ci --prefix frontend --legacy-peer-deps

      - name: Frontend — lint
        run: npm run lint --prefix frontend

      - name: Frontend — typecheck
        run: npm run typecheck --prefix frontend

      - name: Frontend — test
        run: npm run test --prefix frontend

      - name: Typespec — install dependencies
        run: npm ci --prefix typespec

      - name: Typespec — compile
        run: npm run compile --prefix typespec
